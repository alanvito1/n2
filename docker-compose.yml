version: '3.8'

services:
  # Supabase local environment mock (simulação básica)
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: supabase_password
      POSTGRES_DB: supabase
    ports:
      - "5432:5432"
    volumes:
      - ./infrastructure/db_data:/var/lib/postgresql/data
      - ./infrastructure/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - n2_network

  # Worker Python - Simulando TEE
  worker:
    build:
      context: ./workers
    environment:
      - API_PORT=8000
    ports:
      - "8000:8000"
    networks:
      - n2_network
    depends_on:
      - db

networks:
  n2_network:
    driver: bridge
